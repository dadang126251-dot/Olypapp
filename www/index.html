<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Olymp Analyzer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>📊 Olymp Analyzer</h1>
      <p class="subtitle">Trading Signal Generator</p>
    </header>
    <div class="input-section">
      <label>Masukkan Harga (pisah dengan koma)</label>
      <textarea id="priceInput" placeholder="Contoh: 100, 102, 98, 105, 103, 110, 108..."></textarea>
      <button onclick="analyze()">🔍 Analisis</button>
    </div>
    <div id="result" class="result hidden">
      <div class="signal-box" id="signalBox">
        <div class="signal-label" id="signalLabel">-</div>
        <div class="signal-desc" id="signalDesc">-</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-title">Harga Terakhir</div><div class="stat-value" id="lastPrice">-</div></div>
        <div class="stat-card"><div class="stat-title">RSI (14)</div><div class="stat-value" id="rsiValue">-</div></div>
        <div class="stat-card"><div class="stat-title">MA 5</div><div class="stat-value" id="ma5Value">-</div></div>
        <div class="stat-card"><div class="stat-title">MA 10</div><div class="stat-value" id="ma10Value">-</div></div>
        <div class="stat-card"><div class="stat-title">Trend</div><div class="stat-value" id="trendValue">-</div></div>
        <div class="stat-card"><div class="stat-title">Perubahan</div><div class="stat-value" id="changeValue">-</div></div>
      </div>
      <div class="chart-section"><canvas id="priceChart"></canvas></div>
      <div class="advice-section">
        <h3>📋 Analisis Detail</h3>
        <div id="adviceText" class="advice-text"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
